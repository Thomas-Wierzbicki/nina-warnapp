<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NINA Warnungen Deutschland by DA1TWD</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #aaaaaa;
            --color-minor: #fbc02d;
            --color-moderate: #f57c00;
            --color-severe: #d32f2f;
            --color-extreme: #7b1fa2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
            overflow-x: hidden;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;
            flex-wrap: wrap; gap: 15px;
        }

        .header-controls { display: flex; align-items: center; gap: 15px; }

        select {
            background-color: #333; color: #fff; border: 1px solid #555;
            padding: 8px 12px; border-radius: 4px; font-size: 0.95rem;
            cursor: pointer; outline: none;
        }

        #map {
            height: 400px; width: 100%; border-radius: 8px; margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid #333;
        }

        /* --- CONFIG HOVER --- */
        .config-badge { position: relative; display: inline-block; }
        .config-hover-card {
            display: none; position: absolute; right: 0; top: 100%; margin-top: 10px;
            background: rgba(30, 30, 30, 0.95); border: 1px solid #555;
            border-radius: 8px; padding: 15px; width: 240px; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-family: monospace;
            text-align: left;
        }
        .config-badge:hover .config-hover-card { display: block; }
        .btn-config { background: #444; color: #fff; border: 1px solid #666; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* --- DASHBOARD GRID --- */
        .state-section { margin-bottom: 40px; }
        .state-title { font-size: 1.4rem; margin-bottom: 15px; color: #fff; border-bottom: 2px solid #333; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

        .card {
            background-color: var(--card-bg); border-radius: 8px; padding: 18px;
            border-top: 5px solid #555; transition: transform 0.2s ease;
            cursor: pointer; position: relative;
        }
        .card:hover { transform: translateY(-5px); background-color: #252525; }

        .severity-Minor { border-top-color: var(--color-minor); }
        .severity-Moderate { border-top-color: var(--color-moderate); }
        .severity-Severe { border-top-color: var(--color-severe); }
        .severity-Extreme { border-top-color: var(--color-extreme); }

        .card h3 { margin: 0 0 10px 0; font-size: 1.1rem; }
        .badge { font-size: 0.75rem; font-weight: bold; padding: 2px 6px; border-radius: 3px; background: #333; }

        .tx-status { font-size: 0.7rem; margin-top: 5px; font-weight: bold; }
        .status-active { color: #4caf50; }
        .status-inactive { color: #757575; }

        .description {
            font-size: 0.9rem; line-height: 1.4; color: #bbb;
            max-height: 75px; overflow: hidden; position: relative;
            white-space: pre-wrap;
        }
        .description::after {
            content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 25px;
            background: linear-gradient(transparent, var(--card-bg));
        }

        /* --- MODAL WINDOW --- */
        .modal {
            display: none; position: fixed; z-index: 10000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);
        }
        .modal-content {
            background-color: var(--card-bg); margin: 5% auto; padding: 25px;
            border: 1px solid #444; width: 85%; max-width: 800px; border-radius: 12px;
            max-height: 80vh; overflow-y: auto; position: relative;
        }
        .close-modal { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        #modalBody { line-height: 1.6; white-space: pre-wrap; color: #eee; font-size: 1rem; }

        .all-clear { text-align: center; padding: 40px; color: #4caf50; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header>
        <h1>🚨 NINA Warnungen by DA1TWD</h1>
        <div class="header-controls">
            <select id="severity-filter">
                <option value="1">Alle (ab Gelb)</option>
                <option value="2">Ab Mittel (Orange)</option>
                <option value="3" selected>Ab Hoch (Rot)</option>
                <option value="4">Nur Extrem (Lila)</option>
            </select>
            <div id="last-update" style="font-size: 0.9rem; color: var(--text-muted);">Lade...</div>
            <div class="config-badge">
                <button class="btn-config">⚙ Config</button>
                <div class="config-hover-card" id="configDetails">Lade System-Status...</div>
            </div>
        </div>
    </header>

    <div id="map"></div>
    <div id="dashboard"></div>

    <div id="textModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalDate" style="color: var(--text-muted); font-size: 0.9rem;"></p>
            <hr style="border:0; border-top: 1px solid #444; margin: 15px 0;">
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([51.1657, 10.4515], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const markersLayer = L.layerGroup().addTo(map);

        let lastData = null;
        let serverConfig = {};

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                serverConfig = await res.json();
                document.getElementById('configDetails').innerHTML = `
                    <div style="color:#ffc107; margin-bottom:5px; border-bottom:1px solid #555;">System-Status</div>
                    <b>ID:</b> ${serverConfig.STATION || 'DA1TWD'}<br>
                    <b>CALL:</b> ${serverConfig.CALL || '9'}<br>
                    <b>TX-LVL:</b> ${serverConfig.MIN_LEVEL || 1}<br>
                    <b>MODE:</b> ${serverConfig.TEST ? 'TEST' : 'NORMAL'}<br>
                    <div style="color:#ffc107; margin-top:5px; border-top:1px solid #555; font-size:0.75rem;">
                        <b>HOME_ARS:</b><br>
                        <span style="color:#aaa; word-break: break-all;">${serverConfig.HOME_ARS_RAW || '🌍 Global'}</span>
                    </div>
                `;
            } catch (e) { 
                document.getElementById('configDetails').innerText = "Config Offline"; 
            }
        }

        async function loadRadar() {
            try {
                const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await res.json();
                const latest = data.radar.past[data.radar.past.length - 1];
                L.tileLayer(`https://tilecache.rainviewer.com${latest.path}/256/{z}/{x}/{y}/2/1_1.png`, { opacity: 0.35 }).addTo(map);
            } catch (e) { }
        }

        function cleanHTML(raw) {
            if(!raw) return "";
            let text = raw.replace(/<br\s*\/?>/gi, '\n'); 
            const temp = document.createElement("div");
            temp.innerHTML = text;
            return (temp.textContent || temp.innerText || "").trim();
        }

        function getSevLevel(s) {
            const levels = { "Extreme": 4, "Severe": 3, "Moderate": 2, "Minor": 1 };
            return levels[s] || 0;
        }

        function isTransmitted(w) {
            const level = getSevLevel(w.severity);
            if (level < serverConfig.MIN_LEVEL) return false;
            
            if (!serverConfig.HOME_ARS_RAW) return true; 

            const homeList = serverConfig.HOME_ARS_RAW.split(',').map(s => s.trim());
            const warningArsList = w.rawArsString ? w.rawArsString.split(',').map(s => s.trim()) : [];
            
            return warningArsList.some(wArs => {
                const wArsKreis = wArs.substring(0, 5);
                return homeList.some(hArs => hArs === wArs || hArs.startsWith(wArsKreis));
            });
        }

        async function updateData() {
            try {
                await loadConfig();
                const res = await fetch('/nina_current.json?t=' + Date.now());
                lastData = await res.json();
                document.getElementById('last-update').innerText = `Update: ${new Date().toLocaleTimeString()} Uhr`;
                renderDashboard();
            } catch (e) { }
        }

        function renderDashboard() {
            if (!lastData) return;
            const dashboard = document.getElementById('dashboard');
            const filterLevel = parseInt(document.getElementById('severity-filter').value);
            
            dashboard.innerHTML = '';
            markersLayer.clearLayers();
            let total = 0;

            for (const [region, warnings] of Object.entries(lastData)) {
                const filtered = warnings.filter(w => getSevLevel(w.severity) >= filterLevel);
                if (filtered.length === 0) continue;
                total += filtered.length;

                const section = document.createElement('div');
                section.className = 'state-section';
                section.innerHTML = `<div class="state-title">${region}</div>`;
                const grid = document.createElement('div');
                grid.className = 'grid';

                filtered.forEach(w => {
                    const cleanText = cleanHTML(w.description);
                    const isTX = isTransmitted(w);

                    if (w.coords) {
                        const markerOptions = {
                            radius: isTX ? 10 : 7, 
                            fillColor: getHex(w.severity),
                            color: isTX ? "#fff" : getHex(w.severity),
                            weight: isTX ? 3 : 1,
                            fillOpacity: isTX ? 0.9 : 0.3,
                            dashArray: isTX ? null : "5, 5"
                        };

                        L.circleMarker([w.coords.lat, w.coords.lon], markerOptions)
                            .addTo(markersLayer)
                            .bindPopup(`<b>${w.title}</b><br>Funk-Status: ${isTX ? '📡 GESENDET' : '⚪ Nur Dashboard'}`);
                    }

                    const card = document.createElement('div');
                    card.className = `card severity-${w.severity}`;
                    card.onclick = () => openModal(w.title, w.date, w.description);
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:start;">
                            <h3>${w.title}</h3>
                            <span class="badge" style="color:${getHex(w.severity)}">${w.severity}</span>
                        </div>
                        <div class="tx-status ${isTX ? 'status-active' : 'status-inactive'}">
                            ${isTX ? '📡 MeshCom: Aktiv' : '⚪ MeshCom: Gefiltert'}
                        </div>
                        <div style="font-size:0.75rem; color:#888; margin-top:5px;">${w.date}</div>
                        <div class="description">${cleanText}</div>
                    `;
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                dashboard.appendChild(section);
            }
        }

        function getHex(s) {
            const colors = { "Extreme": "#7b1fa2", "Severe": "#d32f2f", "Moderate": "#f57c00", "Minor": "#fbc02d" };
            return colors[s] || "#757575";
        }

        function openModal(title, date, text) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDate').innerText = date;
            document.getElementById('modalBody').innerText = cleanHTML(text);
            document.getElementById('textModal').style.display = "block";
        }

        function closeModal() { document.getElementById('textModal').style.display = "none"; }
        
        document.getElementById('severity-filter').addEventListener('change', renderDashboard);
        loadRadar();
        updateData();
        setInterval(updateData, 60000);
    </script>
</body>
</html>
